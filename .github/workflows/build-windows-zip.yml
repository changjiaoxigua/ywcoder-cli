name: Build Windows ZIP Offline Package

on:
  push:
    branches:
      - feature/brand-replacement
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows-zip:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js 18.20.0
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '18.20.0'

      - name: Set up Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: npm install

      - name: Build
        run: bun run build

      - name: Create offline package
        run: |
          # Create package directory
          New-Item -ItemType Directory -Force -Path "ywcoder-offline"

          # Copy all necessary files
          Copy-Item -Path "bin" -Destination "ywcoder-offline/bin" -Recurse
          Copy-Item -Path "dist" -Destination "ywcoder-offline/dist" -Recurse
          Copy-Item -Path "node_modules" -Destination "ywcoder-offline/node_modules" -Recurse
          Copy-Item -Path "package.json" -Destination "ywcoder-offline/package.json"
          Copy-Item -Path "README.md" -Destination "ywcoder-offline/README.md" -ErrorAction SilentlyContinue
          Copy-Item -Path "LICENSE" -Destination "ywcoder-offline/LICENSE" -ErrorAction SilentlyContinue

          # Create install script
          @'
          @echo off
          chcp 65001 >nul
          echo ========================================
          echo  YwCoder 自动安装脚本
          echo ========================================
          echo.

          :: Check Node.js
          node --version >nul 2>&1
          if errorlevel 1 (
              echo [错误] 未检测到 Node.js，请先安装 Node.js 18+
              echo 下载地址: https://nodejs.org/dist/v18.20.5/node-v18.20.5-x64.msi
              pause
              exit /b 1
          )

          echo [1/3] 检测到 Node.js:
          node --version
          echo.

          :: Get npm paths
          for /f "delims=" %%i in ('npm root -g') do set NPM_ROOT=%%i
          for /f "delims=" %%i in ('npm bin -g') do set NPM_BIN=%%i

          echo [2/3] 安装 YwCoder 到:
          echo %NPM_ROOT%\@dcywzc\ywcoder
          echo.

          :: Create directory
          if not exist "%NPM_ROOT%\@dcywzc" mkdir "%NPM_ROOT%\@dcywzc"

          :: Copy files using xcopy
          echo 正在复制文件，请稍候...
          xcopy /E /I /Y /Q "%~dp0node_modules" "%NPM_ROOT%\@dcywzc\ywcoder\node_modules" >nul
          xcopy /E /I /Y /Q "%~dp0dist" "%NPM_ROOT%\@dcywzc\ywcoder\dist" >nul
          xcopy /E /I /Y /Q "%~dp0bin" "%NPM_ROOT%\@dcywzc\ywcoder\bin" >nul
          copy /Y "%~dp0package.json" "%NPM_ROOT%\@dcywzc\ywcoder\package.json" >nul
          copy /Y "%~dp0README.md" "%NPM_ROOT%\@dcywzc\ywcoder\README.md" >nul 2>&1

          :: Create bin scripts
          copy /Y "%~dp0bin\ywcoder.cmd" "%NPM_BIN%\ywcoder.cmd" >nul
          copy /Y "%~dp0bin\ywcoder" "%NPM_BIN%\ywcoder" >nul 2>&1

          echo [3/3] 安装完成！
          echo.
          echo ========================================
          echo  安装成功！请重新打开终端运行:
          echo    ywcoder --version
          echo ========================================
          echo.
          pause
          '@ | Out-File -FilePath "ywcoder-offline\INSTALL.bat" -Encoding UTF8

          # Create README for offline package
          @'
          # YwCoder 离线安装包

          ## 快速安装（推荐）

          双击运行 `INSTALL.bat`，自动完成安装。

          ## 手动安装

          如需手动安装，将本目录内容复制到 npm 全局目录：

          ```
          %APPDATA%\npm\node_modules\@dcywzc\ywcoder\
          ```

          ## 配置 API

          设置环境变量（添加到系统环境变量）：

          ```
          CLAUDE_CODE_USE_OPENAI=1
          OPENAI_API_KEY=your-api-key
          OPENAI_BASE_URL=https://api.kimi.com/coding/v1
          OPENAI_MODEL=kimi-for-coding
          ```

          ## 启动

          ```
          ywcoder
          ```

          ## 卸载

          ```
          npm uninstall -g @dcywzc/ywcoder
          ```
          '@ | Out-File -FilePath "ywcoder-offline\README-OFFLINE.md" -Encoding UTF8

      - name: Create zip package
        run: |
          Compress-Archive -Path ywcoder-offline\* -DestinationPath ywcoder-windows-offline.zip

          # Show package info
          Write-Host ""
          Write-Host "========================================"
          Write-Host "ZIP 离线包创建成功！"
          Write-Host "========================================"
          Get-ChildItem ywcoder-windows-offline.zip | Select-Object Name, @{Name="Size(MB)";Expression={[math]::Round($_.Length/1MB,2)}}

      - name: Upload zip package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ywcoder-windows-offline-zip
          path: ywcoder-windows-offline.zip
          retention-days: 30

      - name: Show install instructions
        run: |
          Write-Host ""
          Write-Host "使用方法:"
          Write-Host "1. 下载 ywcoder-windows-offline-zip artifact"
          Write-Host "2. 解压 zip 文件"
          Write-Host "3. 双击运行 INSTALL.bat"
          Write-Host "4. 安装完成后，重新打开终端运行 ywcoder"
          Write-Host ""
