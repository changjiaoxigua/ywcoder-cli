name: Build Windows Offline Package

on:
  push:
    branches:
      - feature/brand-replacement
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows-offline:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js 18.20.0
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '18.20.0'

      - name: Set up Bun (for build only)
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: 1.3.11

      - name: Install dependencies with npm
        run: npm install

      - name: Build with Bun
        run: bun run build

      - name: Create offline package directory
        run: |
          New-Item -ItemType Directory -Force -Path "offline-package"
          Copy-Item -Path "dist" -Destination "offline-package/dist" -Recurse
          Copy-Item -Path "bin" -Destination "offline-package/bin" -Recurse
          Copy-Item -Path "package.json" -Destination "offline-package/package.json"
          Copy-Item -Path "README.md" -Destination "offline-package/README.md" -ErrorAction SilentlyContinue
          Copy-Item -Path "LICENSE" -Destination "offline-package/LICENSE" -ErrorAction SilentlyContinue

      - name: Install dependencies with npm (for Windows)
        working-directory: offline-package
        run: npm install --production

      - name: Create install script
        working-directory: offline-package
        run: |
          @'
          @echo off
          echo Installing YwCoder...
          echo.

          :: Check Node.js version
          node --version >nul 2>&1
          if errorlevel 1 (
              echo Error: Node.js is not installed or not in PATH.
              echo Please install Node.js 18.20.0 or later.
              pause
              exit /b 1
          )

          :: Get npm global directory
          for /f "delims=" %%i in ('npm root -g') do set NPM_ROOT=%%i
          for /f "delims=" %%i in ('npm bin -g') do set NPM_BIN=%%i

          echo Installing to: %NPM_ROOT%\@dcywzc\ywcoder
          echo.

          :: Create directory and copy files
          if not exist "%NPM_ROOT%\@dcywzc" mkdir "%NPM_ROOT%\@dcywzc"
          xcopy /E /I /Y .\node_modules "%NPM_ROOT%\@dcywzc\ywcoder\node_modules"
          xcopy /E /I /Y .\dist "%NPM_ROOT%\@dcywzc\ywcoder\dist"
          xcopy /E /I /Y .\bin "%NPM_ROOT%\@dcywzc\ywcoder\bin"
          copy /Y .\package.json "%NPM_ROOT%\@dcywzc\ywcoder\package.json"
          copy /Y .\README.md "%NPM_ROOT%\@dcywzc\ywcoder\README.md" >nul 2>&1
          copy /Y .\LICENSE "%NPM_ROOT%\@dcywzc\ywcoder\LICENSE" >nul 2>&1

          :: Create bin scripts
          copy /Y .\bin\ywcoder.cmd "%NPM_BIN%\ywcoder.cmd"
          copy /Y .\bin\ywcoder "%NPM_BIN%\ywcoder"
          copy /Y .\bin\openclaude "%NPM_BIN%\openclaude" >nul 2>&1

          echo.
          echo Installation complete!
          echo.
          echo Please restart your terminal and run: ywcoder --version
          pause
          '@ | Out-File -FilePath "INSTALL.bat" -Encoding ASCII

      - name: Create zip package
        run: |
          Compress-Archive -Path offline-package\* -DestinationPath ywcoder-windows-offline.zip

      - name: Upload offline package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ywcoder-windows-offline
          path: ywcoder-windows-offline.zip
          retention-days: 30

      - name: Show package info
        run: |
          Write-Host "Package created successfully!"
          Get-ChildItem ywcoder-windows-offline.zip | Select-Object Name, @{Name="Size(MB)";Expression={[math]::Round($_.Length/1MB,2)}}
