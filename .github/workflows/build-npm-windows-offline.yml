name: Build NPM Windows Offline Package

on:
  push:
    branches:
      - feature/brand-replacement
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-npm-offline:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js 18.20.0
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '18.20.0'

      - name: Set up Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: npm install

      - name: Build
        run: bun run build

      - name: Download ripgrep for Windows only
        run: |
          # Create vendor/ripgrep directory structure for Windows only
          New-Item -ItemType Directory -Force -Path "vendor/ripgrep/x64-win32"

          # Download Windows x64 ripgrep
          $rgVersion = "14.1.0"
          $rgUrl = "https://github.com/BurntSushi/ripgrep/releases/download/$rgVersion/ripgrep-$rgVersion-x86_64-pc-windows-msvc.zip"
          Invoke-WebRequest -Uri $rgUrl -OutFile "rg-windows.zip"
          New-Item -ItemType Directory -Force -Path "rg-temp"
          Expand-Archive -Path "rg-windows.zip" -DestinationPath "rg-temp"
          # Find rg.exe in the extracted directory (might be in a subdirectory)
          $rgExe = Get-ChildItem -Path "rg-temp" -Filter "rg.exe" -Recurse | Select-Object -First 1
          if ($rgExe) {
              Copy-Item -Path $rgExe.FullName -Destination "vendor/ripgrep/x64-win32/rg.exe"
              Write-Host "Found rg.exe at: $($rgExe.FullName)"
          } else {
              Write-Error "rg.exe not found in extracted archive"
              exit 1
          }
          Remove-Item -Path "rg-windows.zip" -Force
          Remove-Item -Path "rg-temp" -Recurse -Force

          Write-Host "Downloaded ripgrep for Windows x64"

          # Show vendor directory structure
          Write-Host "Vendor directory structure:"
          Get-ChildItem -Recurse vendor/

      - name: Copy vendor to dist for ripgrep path resolution
        run: |
          # ripgrep.ts expects vendor at dist/vendor/ripgrep
          # Copy vendor directory to dist/ so the path resolution works
          Copy-Item -Path "vendor" -Destination "dist/vendor" -Recurse -Force
          Write-Host "Copied vendor to dist/ directory"
          Get-ChildItem -Recurse dist/vendor/

      - name: Prepare minimal node_modules for offline packing
        run: node scripts/prepare-offline-pack.mjs

      - name: Pack npm package
        run: npm pack --ignore-scripts

      - name: Show package info
        run: |
          Write-Host "Package created:"
          Get-ChildItem dcywzc-ywcoder-*.tgz | Select-Object Name, @{Name="Size(MB)";Expression={[math]::Round($_.Length/1MB,2)}}

      - name: Upload package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ywcoder-offline
          path: dcywzc-ywcoder-*.tgz
          retention-days: 30

      - name: Show install instructions
        run: |
          Write-Host ""
          Write-Host "========================================"
          Write-Host "Offline package created successfully!"
          Write-Host "========================================"
          Write-Host ""
          Write-Host "Install with:"
          Write-Host "  npm install -g dcywzc-ywcoder-1.0.1.tgz"
          Write-Host ""
