name: Build NPM Offline Package

on:
  push:
    branches:
      - feature/brand-replacement
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-npm-offline:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js 18.20.0
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '18.20.0'

      - name: Set up Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: npm install

      - name: Build
        run: bun run build

      - name: Create offline package directory
        run: |
          # Create directory structure for packaging
          New-Item -ItemType Directory -Force -Path "pack-temp"
          New-Item -ItemType Directory -Force -Path "pack-temp/bin"
          New-Item -ItemType Directory -Force -Path "pack-temp/dist"
          New-Item -ItemType Directory -Force -Path "pack-temp/node_modules"

          # Copy files
          Copy-Item -Path "bin/*" -Destination "pack-temp/bin/" -Recurse
          Copy-Item -Path "dist/*" -Destination "pack-temp/dist/" -Recurse
          Copy-Item -Path "node_modules/*" -Destination "pack-temp/node_modules/" -Recurse
          Copy-Item -Path "README.md" -Destination "pack-temp/README.md" -ErrorAction SilentlyContinue
          Copy-Item -Path "LICENSE" -Destination "pack-temp/LICENSE" -ErrorAction SilentlyContinue

      - name: Create bundled package.json
        run: |
          node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.bundledDependencies = Object.keys(pkg.dependencies);
          fs.writeFileSync('pack-temp/package.json', JSON.stringify(pkg, null, 2));
          console.log('Bundled', pkg.bundledDependencies.length, 'dependencies');
          "

      - name: Pack npm package
        working-directory: pack-temp
        run: npm pack

      - name: Move package and show info
        run: |
          Move-Item -Path "pack-temp/dcywzc-ywcoder-*.tgz" -Destination "ywcoder-offline.tgz" -Force
          Write-Host "Package created:"
          Get-ChildItem ywcoder-offline.tgz | Select-Object Name, @{Name="Size(MB)";Expression={[math]::Round($_.Length/1MB,2)}}

      - name: Upload package (uncompressed)
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ywcoder-offline
          path: ywcoder-offline.tgz
          retention-days: 30

      - name: Show install instructions
        run: |
          Write-Host ""
          Write-Host "========================================"
          Write-Host "Offline package created successfully!"
          Write-Host "========================================"
          Write-Host ""
          Write-Host "Install with:"
          Write-Host "  npm install -g ywcoder-offline.tgz"
          Write-Host ""
