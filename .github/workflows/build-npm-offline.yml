name: Build NPM Offline Package

on:
  push:
    branches:
      - feature/brand-replacement
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-npm-offline:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Node.js 18.20.0
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: '18.20.0'

      - name: Set up Bun
        uses: oven-sh/setup-bun@4bc047ad259df6fc24a6c9b0f9a0cb08cf17fbe5 # v2.0.1
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: npm install

      - name: Build
        run: bun run build

      - name: Download ripgrep for vendor directory
        run: |
          # Create vendor/ripgrep directory structure
          New-Item -ItemType Directory -Force -Path "vendor/ripgrep/x64-win32"
          New-Item -ItemType Directory -Force -Path "vendor/ripgrep/x64-linux"
          New-Item -ItemType Directory -Force -Path "vendor/ripgrep/x64-darwin"
          New-Item -ItemType Directory -Force -Path "vendor/ripgrep/arm64-darwin"

          # Download Windows x64 ripgrep
          $rgVersion = "14.1.0"
          $rgUrl = "https://github.com/BurntSushi/ripgrep/releases/download/$rgVersion/ripgrep-$rgVersion-x86_64-pc-windows-msvc.zip"
          Invoke-WebRequest -Uri $rgUrl -OutFile "rg-windows.zip"
          New-Item -ItemType Directory -Force -Path "rg-temp"
          Expand-Archive -Path "rg-windows.zip" -DestinationPath "rg-temp"
          # Find rg.exe in the extracted directory (might be in a subdirectory)
          $rgExe = Get-ChildItem -Path "rg-temp" -Filter "rg.exe" -Recurse | Select-Object -First 1
          if ($rgExe) {
              Copy-Item -Path $rgExe.FullName -Destination "vendor/ripgrep/x64-win32/rg.exe"
              Write-Host "Found rg.exe at: $($rgExe.FullName)"
          } else {
              Write-Error "rg.exe not found in extracted archive"
              exit 1
          }
          Remove-Item -Path "rg-windows.zip" -Force
          Remove-Item -Path "rg-temp" -Recurse -Force

          Write-Host "Downloaded ripgrep for Windows x64"

          # Download Linux x64 ripgrep
          $rgLinuxUrl = "https://github.com/BurntSushi/ripgrep/releases/download/$rgVersion/ripgrep-$rgVersion-x86_64-unknown-linux-musl.tar.gz"
          Invoke-WebRequest -Uri $rgLinuxUrl -OutFile "rg-linux.tar.gz"
          New-Item -ItemType Directory -Force -Path "rg-linux-temp"
          tar -xzf "rg-linux.tar.gz" -C "rg-linux-temp"
          $rgLinux = Get-ChildItem -Path "rg-linux-temp" -Filter "rg" -Recurse | Select-Object -First 1
          if ($rgLinux) {
              Copy-Item -Path $rgLinux.FullName -Destination "vendor/ripgrep/x64-linux/rg"
          }
          Remove-Item -Path "rg-linux.tar.gz" -Force
          Remove-Item -Path "rg-linux-temp" -Recurse -Force

          Write-Host "Downloaded ripgrep for Linux x64"

          # Download macOS x64 ripgrep
          $rgMacUrl = "https://github.com/BurntSushi/ripgrep/releases/download/$rgVersion/ripgrep-$rgVersion-x86_64-apple-darwin.tar.gz"
          Invoke-WebRequest -Uri $rgMacUrl -OutFile "rg-mac.tar.gz"
          New-Item -ItemType Directory -Force -Path "rg-mac-temp"
          tar -xzf "rg-mac.tar.gz" -C "rg-mac-temp"
          $rgMac = Get-ChildItem -Path "rg-mac-temp" -Filter "rg" -Recurse | Select-Object -First 1
          if ($rgMac) {
              Copy-Item -Path $rgMac.FullName -Destination "vendor/ripgrep/x64-darwin/rg"
          }
          Remove-Item -Path "rg-mac.tar.gz" -Force
          Remove-Item -Path "rg-mac-temp" -Recurse -Force

          Write-Host "Downloaded ripgrep for macOS x64"

          # Download macOS arm64 ripgrep
          $rgMacArmUrl = "https://github.com/BurntSushi/ripgrep/releases/download/$rgVersion/ripgrep-$rgVersion-aarch64-apple-darwin.tar.gz"
          Invoke-WebRequest -Uri $rgMacArmUrl -OutFile "rg-mac-arm.tar.gz"
          New-Item -ItemType Directory -Force -Path "rg-mac-arm-temp"
          tar -xzf "rg-mac-arm.tar.gz" -C "rg-mac-arm-temp"
          $rgMacArm = Get-ChildItem -Path "rg-mac-arm-temp" -Filter "rg" -Recurse | Select-Object -First 1
          if ($rgMacArm) {
              Copy-Item -Path $rgMacArm.FullName -Destination "vendor/ripgrep/arm64-darwin/rg"
          }
          Remove-Item -Path "rg-mac-arm.tar.gz" -Force
          Remove-Item -Path "rg-mac-arm-temp" -Recurse -Force

          Write-Host "Downloaded ripgrep for macOS arm64"

          # Show vendor directory structure
          Write-Host "Vendor directory structure:"
          Get-ChildItem -Recurse vendor/

      - name: Create offline package with node_modules
        run: |
          # Add bundledDependencies to package.json
          node -e "
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          pkg.bundledDependencies = Object.keys(pkg.dependencies || {});
          fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          console.log('Added bundledDependencies:', pkg.bundledDependencies.length);
          "

      - name: Pack npm package
        run: npm pack

      - name: Show package info
        run: |
          Write-Host "Package created:"
          Get-ChildItem dcywzc-ywcoder-*.tgz | Select-Object Name, @{Name="Size(MB)";Expression={[math]::Round($_.Length/1MB,2)}}

      - name: Upload package
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ywcoder-offline
          path: dcywzc-ywcoder-*.tgz
          retention-days: 30

      - name: Show install instructions
        run: |
          Write-Host ""
          Write-Host "========================================"
          Write-Host "Offline package created successfully!"
          Write-Host "========================================"
          Write-Host ""
          Write-Host "Install with:"
          Write-Host "  npm install -g dcywzc-ywcoder-1.0.0.tgz"
          Write-Host ""
